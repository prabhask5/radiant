<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Radiant Finance</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #0a0806;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      color: #ffffff;
      padding: 24px;
    }

    .card {
      max-width: 400px;
      width: 100%;
      text-align: center;
      padding: 48px 32px;
      background: rgba(16, 14, 10, 0.8);
      border: 1px solid rgba(212, 160, 57, 0.25);
      border-radius: 20px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 0 60px rgba(212, 160, 57, 0.08), 0 0 1px rgba(212, 160, 57, 0.3);
    }

    .gem-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 28px;
      animation: glow-pulse 3s ease-in-out infinite;
    }

    @keyframes glow-pulse {
      0%, 100% { filter: drop-shadow(0 0 8px rgba(212, 160, 57, 0.4)); }
      50% { filter: drop-shadow(0 0 20px rgba(212, 160, 57, 0.7)); }
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #ffffff;
    }

    p {
      font-size: 15px;
      line-height: 1.5;
      color: #8888a0;
      margin-bottom: 32px;
    }

    .btn {
      display: inline-block;
      padding: 14px 40px;
      font-size: 15px;
      font-weight: 600;
      color: #ffffff;
      background: linear-gradient(135deg, #d4a039, #e8b94a);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.2s;
    }

    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
  </style>
</head>
<body>
  <div class="card">
    <div class="gem-icon">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="32,4 56,24 48,58 16,58 8,24" fill="url(#gem-grad)" stroke="rgba(232,185,74,0.5)" stroke-width="1.5"/>
        <polygon points="32,4 24,24 40,24" fill="rgba(232,185,74,0.4)"/>
        <polygon points="8,24 24,24 16,58" fill="rgba(212,160,57,0.3)"/>
        <polygon points="56,24 40,24 48,58" fill="rgba(212,160,57,0.3)"/>
        <polygon points="24,24 40,24 48,58 16,58" fill="rgba(212,160,57,0.15)"/>
        <line x1="24" y1="24" x2="40" y2="24" stroke="rgba(232,185,74,0.5)" stroke-width="0.75"/>
        <line x1="32" y1="4" x2="24" y2="24" stroke="rgba(232,185,74,0.3)" stroke-width="0.75"/>
        <line x1="32" y1="4" x2="40" y2="24" stroke="rgba(232,185,74,0.3)" stroke-width="0.75"/>
        <line x1="24" y1="24" x2="16" y2="58" stroke="rgba(232,185,74,0.3)" stroke-width="0.75"/>
        <line x1="40" y1="24" x2="48" y2="58" stroke="rgba(232,185,74,0.3)" stroke-width="0.75"/>
        <defs>
          <linearGradient id="gem-grad" x1="32" y1="4" x2="32" y2="58" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#e8b94a"/>
            <stop offset="100%" stop-color="#d4a039"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
    <h1>You're Offline</h1>
    <p>Check your connection and try again</p>
    <button class="btn" onclick="location.reload()">Try Again</button>
  </div>
</body>
</html>
