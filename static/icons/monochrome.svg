<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- White background -->
  <rect width="512" height="512" fill="#ffffff"/>

  <!-- Gem outline - octagonal brilliant cut -->
  <polygon points="256,72 368,140 412,256 368,372 256,440 144,372 100,256 144,140" fill="none" stroke="black" stroke-width="10" stroke-linejoin="round"/>

  <!-- Facet lines from corners to center -->
  <line x1="256" y1="72" x2="256" y2="256" stroke="black" stroke-width="5"/>
  <line x1="368" y1="140" x2="256" y2="256" stroke="black" stroke-width="5"/>
  <line x1="412" y1="256" x2="256" y2="256" stroke="black" stroke-width="5"/>
  <line x1="368" y1="372" x2="256" y2="256" stroke="black" stroke-width="5"/>
  <line x1="256" y1="440" x2="256" y2="256" stroke="black" stroke-width="5"/>
  <line x1="144" y1="372" x2="256" y2="256" stroke="black" stroke-width="5"/>
  <line x1="100" y1="256" x2="256" y2="256" stroke="black" stroke-width="5"/>
  <line x1="144" y1="140" x2="256" y2="256" stroke="black" stroke-width="5"/>

  <!-- Inner table octagon -->
  <polygon points="256,180 304,210 320,256 304,302 256,332 208,302 192,256 208,210" fill="none" stroke="black" stroke-width="6" stroke-linejoin="round"/>
</svg>